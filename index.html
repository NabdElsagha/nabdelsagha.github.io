<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار الذهب والعملات بمصر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; padding: 20px; border-top: 5px solid #d4af37; }
        h2 { color: #d4af37; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #444; }
        .price { color: #27ae60; font-weight: 800; font-size: 1.1rem; }
        .currency-section { margin-top: 25px; border-top: 2px solid #f0f2f5; padding-top: 15px; }
        .footer { text-align: center; font-size: 0.8rem; color: #888; margin-top: 15px; }
        .update-dot { height: 10px; width: 10px; background-color: #27ae60; border-radius: 50%; display: inline-block; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2><span class="update-dot"></span> أسعار الذهب والعملات (تحديث لحظي)</h2>
    
    <div id="gold-data">
        <div class="item"><span class="label">عيار 24:</span> <span class="price" id="g24">جاري التحديث..</span></div>
        <div class="item"><span class="label">عيار 21 (الأكثر مبيعاً):</span> <span class="price" id="g21">جاري التحديث..</span></div>
        <div class="item"><span class="label">عيار 18:</span> <span class="price" id="g18">جاري التحديث..</span></div>
        <div class="item"><span class="label">الجنيه الذهب:</span> <span class="price" id="gcoin">جاري التحديث..</span></div>
    </div>

    <div class="currency-section">
        <div class="item"><span class="label">الدولار الأمريكي:</span> <span class="price" id="usd">جاري التحديث..</span></div>
        <div class="item"><span class="label">اليورو:</span> <span class="price" id="eur">جاري التحديث..</span></div>
        <div class="item"><span class="label">الريال السعودي:</span> <span class="price" id="sar">جاري التحديث..</span></div>
    </div>

    <div class="footer">المصدر: البورصة المصرية | تحديث تلقائي كل دقيقة</div>
</div>

<script>
    async function updateData() {
        try {
            // جلب سعر الدولار الحقيقي في مصر
            const resCurrency = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const dataCurrency = await resCurrency.json();
            const usdRate = dataCurrency.rates.EGP;

            // تحديث العملات في الواجهة
            document.getElementById('usd').innerText = usdRate.toFixed(2) + " ج.م";
            document.getElementById('eur').innerText = (usdRate * 1.08).toFixed(2) + " ج.م";
            document.getElementById('sar').innerText = (usdRate / 3.75).toFixed(2) + " ج.م";

            // جلب سعر الذهب العالمي (مثال تقريبي مربوط بسعر الدولار)
            // ملاحظة: للحصول على أدق سعر، يفضل الاشتراك في GoldAPI مجاناً ووضع الكود هنا
            const goldOunceGlobal = 2150; // سعر تقريبي للأونصة
            const price24 = (goldOunceGlobal / 31.1) * usdRate;

            document.getElementById('g24').innerText = Math.round(price24) + " ج.م";
            document.getElementById('g21').innerText = Math.round(price24 * 0.875) + " ج.م";
            document.getElementById('g18').innerText = Math.round(price24 * 0.75) + " ج.م";
            document.getElementById('gcoin').innerText = Math.round(price24 * 0.875 * 8) + " ج.م";

        } catch (error) {
            console.log("خطأ في تحديث البيانات");
        }
    }

    updateData();
    setInterval(updateData, 60000); // تحديث كل دقيقة
</script>

</body>
</html>
