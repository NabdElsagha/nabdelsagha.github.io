<div class="container">

<h2>أسعار العملات</h2>

<div class="price">الدولار: <span id="usd">...</span> جنيه</div>

<div class="price">اليورو: <span id="eur">...</span> جنيه</div>

<div class="price">الريال السعودي: <span id="sar">...</span> جنيه</div>


<h2>أسعار الذهب</h2>

<div class="price">ذهب عيار 24: <span id="gold24">...</span></div>

<div class="price">ذهب عيار 21: <span id="gold21">...</span></div>

<div class="price">ذهب عيار 18: <span id="gold18">...</span></div>

<div class="price">الجنيه الذهب: <span id="pound">...</span></div>


<div class="update">
آخر تحديث: <span id="time"></span>
</div>

</div>


<footer>

© 2026 نبض الصاغة

</footer>


<script>

let usdToEgp = 0
let lastUSD = 0


async function getCurrency(){

let response = await fetch("https://open.er-api.com/v6/latest/USD")

let data = await response.json()

usdToEgp = data.rates.EGP

let usdElement = document.getElementById("usd")

if(lastUSD !== 0){

if(usdToEgp > lastUSD){
usdElement.className = "up"
}

else if(usdToEgp < lastUSD){
usdElement.className = "down"
}

}

usdElement.innerText = usdToEgp.toFixed(2)

document.getElementById("eur").innerText =
(usdToEgp / data.rates.EUR).toFixed(2)

document.getElementById("sar").innerText =
(usdToEgp / data.rates.SAR).toFixed(2)

lastUSD = usdToEgp

}



async function getGold(){

let response = await fetch("https://api.gold-api.com/price/XAU")

let data = await response.json()

let ounce = data.price

let gramUSD = ounce / 31.1

let gramEGP = gramUSD * usdToEgp

let gold24 = gramEGP
let gold21 = gramEGP * 0.875
let gold18 = gramEGP * 0.75

document.getElementById("gold24").innerText =
gold24.toFixed(0) + " جنيه"

document.getElementById("gold21").innerText =
gold21.toFixed(0) + " جنيه"

document.getElementById("gold18").innerText =
gold18.toFixed(0) + " جنيه"

document.getElementById("pound").innerText =
(gold21 * 8).toFixed(0) + " جنيه"

}



function updateTime(){

let now = new Date()

document.getElementById("time").innerText =
now.toLocaleTimeString("ar-EG")

}



async function updateAll(){

await getCurrency()

await getGold()

updateTime()

}



updateAll()

setInterval(updateAll,60000)

</script>
