<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نبض الصاغة | أسعار الذهب والعملات</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f5f5f5;
margin:0;
text-align:center;
}

header{
background:#c9a227;
color:white;
padding:15px;
font-size:24px;
}

nav{
background:#222;
padding:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:16px;
}

.container{
background:white;
width:350px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
color:#c9a227;
}

.price{
font-size:20px;
margin:8px;
}

.update{
color:gray;
font-size:14px;
margin-top:10px;
}

.up{color:green}
.down{color:red}

footer{
margin-top:30px;
padding:15px;
background:#eee;
}

</style>
</head>

<body>

<header>
نبض الصاغة
</header>

<nav>
<a href="index.html">الرئيسية</a>
<a href="about.html">من نحن</a>
<a href="privacy.html">سياسة الخصوصية</a>
<a href="contact.html">اتصل بنا</a>
</nav>

<div class="container">

<h2>أسعار العملات</h2>

<div class="price">الدولار: <span id="usd">...</span> جنيه</div>
<div class="price">اليورو: <span id="eur">...</span> جنيه</div>
<div class="price">الريال السعودي: <span id="sar">...</span> جنيه</div>

<h2>أسعار الذهب</h2>

<div class="price">عيار 24: <span id="gold24">...</span></div>
<div class="price">عيار 21: <span id="gold21">...</span></div>
<div class="price">عيار 18: <span id="gold18">...</span></div>
<div class="price">الجنيه الذهب: <span id="pound">...</span></div>

<div class="update">
آخر تحديث: <span id="time"></span>
</div>

</div>

<footer>
© 2026 نبض الصاغة
</footer>

<script>

let lastUSD=0

async function getCurrency(){

let response = await fetch("https://open.er-api.com/v6/latest/USD")
let data = await response.json()

let egp=data.rates.EGP

let usdElement=document.getElementById("usd")

if(lastUSD!==0){
if(egp>lastUSD){
usdElement.className="up"
}else if(egp<lastUSD){
usdElement.className="down"
}
}

usdElement.innerText=egp.toFixed(2)

document.getElementById("eur").innerText=(egp/data.rates.EUR).toFixed(2)

document.getElementById("sar").innerText=(egp/data.rates.SAR).toFixed(2)

lastUSD=egp

}

async function getGold(){

let response=await fetch("https://api.gold-api.com/price/XAU")
let data=await response.json()

let ounce=data.price

let gram=ounce/31.1

let gold24=gram
let gold21=gram*0.875
let gold18=gram*0.75

document.getElementById("gold24").innerText=gold24.toFixed(2)+" $"
document.getElementById("gold21").innerText=gold21.toFixed(2)+" $"
document.getElementById("gold18").innerText=gold18.toFixed(2)+" $"

document.getElementById("pound").innerText=(gold21*8).toFixed(2)+" $"

}

function updateTime(){

let now=new Date()

document.getElementById("time").innerText=
now.toLocaleTimeString()

}

getCurrency()
getGold()
updateTime()

setInterval(()=>{
getCurrency()
getGold()
updateTime()
},60000)

</script>

</body>
</html>
