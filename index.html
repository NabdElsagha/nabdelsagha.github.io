<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>نبض الصاغة | أسعار الذهب</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#0d1b2a;
color:white;
margin:0;
text-align:center;
}

header{
background:#1b263b;
padding:18px;
font-size:26px;
color:#ffd166;
font-weight:bold;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{

background:#1b263b;
border-radius:12px;
padding:18px;
margin-bottom:18px;

}

h2{
color:#ffd166;
margin-bottom:15px;
}

.price{

display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #2d3e5e;
font-size:18px;

}

.price:last-child{
border-bottom:none;
}

.value{
color:#06d6a0;
font-weight:bold;
}

.share{

margin:20px 0;
}

.share button{

background:#25D366;
border:none;
padding:12px 20px;
border-radius:30px;
font-size:16px;
color:white;
cursor:pointer;

}

footer{

font-size:12px;
color:#aaa;
margin-top:20px;

}

</style>

</head>

<body>

<header>
نبض الصاغة
</header>

<div class="container">

<div class="card">

<h2>أسعار الذهب</h2>

<div class="price">
<span>عيار 24</span>
<span class="value" id="gold24">...</span>
</div>

<div class="price">
<span>عيار 21</span>
<span class="value" id="gold21">...</span>
</div>

<div class="price">
<span>عيار 18</span>
<span class="value" id="gold18">...</span>
</div>

<div class="price">
<span>عيار 14</span>
<span class="value" id="gold14">...</span>
</div>

<div class="price">
<span>الجنيه الذهب</span>
<span class="value" id="pound">...</span>
</div>

</div>


<div class="share">

<button onclick="sharePrice()">
مشاركة السعر عبر واتساب
</button>

</div>


<div class="card">

<h2>أسعار العملات</h2>

<div class="price">
<span>الدولار الأمريكي 🇺🇸</span>
<span class="value" id="usd">...</span>
</div>

<div class="price">
<span>اليورو 🇪🇺</span>
<span class="value" id="eur">...</span>
</div>

<div class="price">
<span>الريال السعودي 🇸🇦</span>
<span class="value" id="sar">...</span>
</div>

<div class="price">
<span>الدرهم الإماراتي 🇦🇪</span>
<span class="value" id="aed">...</span>
</div>

<div class="price">
<span>الدينار الكويتي 🇰🇼</span>
<span class="value" id="kwd">...</span>
</div>

</div>

<footer>

الأسعار استرشادية وقد تختلف في محلات الصاغة  
© 2026 نبض الصاغة

</footer>

</div>


<script>

let usdToEgp = 0


async function getCurrency(){

let response = await fetch("https://open.er-api.com/v6/latest/USD")

let data = await response.json()

usdToEgp = data.rates.EGP

document.getElementById("usd").innerText = usdToEgp.toFixed(2)+" ج.م"

document.getElementById("eur").innerText =
(usdToEgp / data.rates.EUR).toFixed(2)+" ج.م"

document.getElementById("sar").innerText =
(usdToEgp / data.rates.SAR).toFixed(2)+" ج.م"

document.getElementById("aed").innerText =
(usdToEgp / data.rates.AED).toFixed(2)+" ج.م"

document.getElementById("kwd").innerText =
(usdToEgp / data.rates.KWD).toFixed(2)+" ج.م"

}



async function getGold(){

let response = await fetch("https://api.gold-api.com/price/XAU")

let data = await response.json()

let ounce = data.price

let gramUSD = ounce / 31.1

let gramEGP = gramUSD * usdToEgp


let gold24 = gramEGP
let gold21 = gramEGP * 0.875
let gold18 = gramEGP * 0.75
let gold14 = gramEGP * 0.585

document.getElementById("gold24").innerText = gold24.toFixed(0)+" ج.م"

document.getElementById("gold21").innerText = gold21.toFixed(0)+" ج.م"

document.getElementById("gold18").innerText = gold18.toFixed(0)+" ج.م"

document.getElementById("gold14").innerText = gold14.toFixed(0)+" ج.م"

document.getElementById("pound").innerText = (gold21 * 8).toFixed(0)+" ج.م"

}



function sharePrice(){

let text =
"أسعار الذهب الآن من موقع نبض الصاغة\n"+
"عيار21: "+document.getElementById("gold21").innerText+"\n"+
"الدولار: "+document.getElementById("usd").innerText

let url="https://wa.me/?text="+encodeURIComponent(text)

window.open(url)

}



async function updateAll(){

await getCurrency()

await getGold()

}

updateAll()

setInterval(updateAll,60000)

</script>

</body>
</html>
