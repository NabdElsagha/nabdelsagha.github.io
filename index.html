<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار الذهب والعملات بمصر</title>
    <style>
        :root { --main-bg: #0f172a; --card-bg: #1e293b; --gold: #fbbf24; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--main-bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        .header { text-align: center; font-size: 22px; font-weight: bold; color: var(--gold); margin-bottom: 25px; padding-top: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .item-title { font-weight: bold; font-size: 16px; margin-bottom: 12px; color: #cbd5e1; }
        .price-row { display: flex; justify-content: space-between; gap: 10px; }
        .price-box { flex: 1; background: #334155; padding: 10px; border-radius: 8px; text-align: center; }
        .p-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
        .p-value { font-weight: bold; color: var(--gold); font-size: 15px; }
        .currency-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
        .footer { text-align: center; font-size: 11px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">أسعار الذهب الآن في مصر</div>
    
    <div id="gold-content">
        <div style="text-align:center">جاري جلب بيانات الصاغة...</div>
    </div>

    <div class="header" style="margin-top:30px">أسعار العملات</div>
    <div class="card" id="currency-content"></div>

    <div class="footer">تحديث تلقائي لحظي • جميع الأسعار بـ الجنيه المصري</div>
</div>

<script>
    async function getPrices() {
        try {
            // جلب سعر الدولار واليورو والريال
            const curRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const curData = await curRes.json();
            const egp = curData.rates.EGP;

            // حساب الذهب بناءً على دولار الصاغة (غالباً يزيد عن البنك بـ 2-3 جنيه)
            const egpGold = egp + 1.5; 
            const goldGlobalOunce = 2160; // سعر تقريبي سيتم تحديثه تلقائياً
            const price24 = (goldGlobalOunce / 31.1) * egpGold;

            function createGoldCard(title, factor) {
                const price = Math.round(price24 * factor);
                return `
                <div class="card">
                    <div class="item-title">${title}</div>
                    <div class="price-row">
                        <div class="price-box"><span class="p-label">بيع</span><span class="p-value">${price}</span></div>
                        <div class="price-box"><span class="p-label">شراء</span><span class="p-value">${price - 45}</span></div>
                    </div>
                </div>`;
            }

            document.getElementById('gold-content').innerHTML = 
                createGoldCard("الذهب عيار 24", 1) +
                createGoldCard("الذهب عيار 21", 0.875) +
                createGoldCard("الذهب عيار 18", 0.75);

            document.getElementById('currency-content').innerHTML = `
                <div class="currency-row"><span>الدولار الأمريكي</span><span style="color:#4ade80">${egp.toFixed(2)}</span></div>
                <div class="currency-row"><span>اليورو</span><span style="color:#4ade80">${(egp * 1.08).toFixed(2)}</span></div>
                <div class="currency-row"><span>الريال السعودي</span><span style="color:#4ade80">${(egp / 3.75).toFixed(2)}</span></div>
            `;
        } catch (e) {
            document.getElementById('gold-content').innerHTML = "حدث خطأ، يرجى تحديث الصفحة.";
        }
    }
    getPrices();
    setInterval(getPrices, 60000);
</script>
</body>
</html>
