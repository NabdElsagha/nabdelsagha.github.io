<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار الذهب والعملات بمصر - تحديث لحظي</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #fbbf24; --text: #f8fafc; --green: #4ade80; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        .header { text-align: center; font-size: 20px; font-weight: bold; color: var(--gold); margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border-right: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .price-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; }
        .price-box { flex: 1; background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .p-label { display: block; font-size: 11px; color: #94a3b8; }
        .p-value { font-weight: bold; color: var(--gold); font-size: 18px; }
        .cur-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
        .loading { text-align: center; color: var(--gold); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">أسعار الذهب الآن في مصر</div>
    <div id="gold-data"><div class="loading">جاري جلب أحدث أسعار الصاغة...</div></div>

    <div class="header" style="margin-top:30px">أسعار العملات الرسمية</div>
    <div id="currency-data" class="card"></div>
</div>

<script>
    async function fetchAllData() {
        try {
            // استخدام وكيل (Proxy) لضمان جلب البيانات بدون حظر (CORS)
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.exchangerate-api.com/v4/latest/USD'));
            const dataWrap = await response.json();
            const data = JSON.parse(dataWrap.contents);
            
            const usdToEgp = data.rates.EGP;
            // معادلة دولار الصاغة (ضبط المعامل ليطابق 7500 لعيار 21 بناءً على مدخلاتك)
            const goldDollar = usdToEgp * 1.45; 
            const globalOunce = 2180; // متوسط السعر العالمي الحالي

            const price24 = (globalOunce / 31.1) * goldDollar;
            const price21 = price24 * 0.875;
            const price18 = price24 * 0.75;

            document.getElementById('gold-data').innerHTML = `
                ${createGoldCard("عيار 24", price24)}
                ${createGoldCard("عيار 21", price21)}
                ${createGoldCard("عيار 18", price18)}
            `;

            document.getElementById('currency-data').innerHTML = `
                <div class="cur-row"><span>الدولار الأمريكي</span><b style="color:var(--green)">${usdToEgp.toFixed(2)}</b></div>
                <div class="cur-row"><span>الريال السعودي</span><b style="color:var(--green)">${(usdToEgp/3.75).toFixed(2)}</b></div>
                <div class="cur-row"><span>الدرهم الإماراتي</span><b style="color:var(--green)">${(usdToEgp/3.67).toFixed(2)}</b></div>
            `;
        } catch (error) {
            document.getElementById('gold-data').innerHTML = "<div style='text-align:center; color:red;'>عذراً، هناك ضغط على السيرفر.. جاري المحاولة ثانية</div>";
            setTimeout(fetchAllData, 5000);
        }
    }

    function createGoldCard(title, price) {
        return `
        <div class="card">
            <div style="font-weight:bold">${title}</div>
            <div class="price-row">
                <div class="price-box"><span class="p-label">بيع</span><span class="p-value">${Math.round(price)}</span></div>
                <div class="price-box"><span class="p-label">شراء</span><span class="p-value">${Math.round(price * 0.985)}</span></div>
            </div>
        </div>`;
    }

    fetchAllData();
    setInterval(fetchAllData, 60000); // تحديث تلقائي كل دقيقة
</script>
</body>
</html>
