<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار الذهب والعملات بمصر - تحديث لحظي</title>
    <style>
        :root { 
            --main-bg: #0f172a; 
            --card-bg: #1e293b; 
            --gold: #fbbf24; 
            --text: #f8fafc; 
            --price-bg: #334155;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--main-bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
        }
        .container { max-width: 450px; margin: auto; }
        .header { 
            text-align: center; 
            font-size: 22px; 
            font-weight: bold; 
            color: var(--gold); 
            margin-bottom: 25px; 
            padding-top: 10px; 
        }
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        .item-title { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 12px; 
            color: #cbd5e1; 
            text-align: right;
        }
        .price-row { 
            display: flex; 
            justify-content: space-between; 
            gap: 10px; 
        }
        .price-box { 
            flex: 1; 
            background: var(--price-bg); 
            padding: 12px; 
            border-radius: 8px; 
            text-align: center; 
        }
        .p-label { 
            display: block; 
            font-size: 12px; 
            color: #94a3b8; 
            margin-bottom: 5px; 
        }
        .p-value { 
            font-weight: bold; 
            color: var(--gold); 
            font-size: 18px; 
        }
        .currency-section { margin-top: 30px; }
        .currency-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid #334155; 
        }
        .currency-row:last-child { border-bottom: none; }
        .c-name { color: #cbd5e1; }
        .c-val { color: #4ade80; font-weight: bold; }
        .footer { 
            text-align: center; 
            font-size: 11px; 
            color: #64748b; 
            margin-top: 25px; 
            line-height: 1.6;
        }
        .loading { text-align: center; color: var(--gold); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">أسعار الذهب الآن في مصر</div>
    
    <div id="gold-content">
        <div class="loading">جاري جلب تحديثات الصاغة...</div>
    </div>

    <div class="header currency-section">أسعار العملات (رسمي)</div>
    <div class="card" id="currency-content">
        <div class="loading">جاري جلب أسعار البنك...</div>
    </div>

    <div class="footer">
        تحديث تلقائي لحظي • جميع الأسعار بالجنيه المصري<br>
        المصدر: البورصة العالمية وسوق الصاغة المصري
    </div>
</div>

<script>
    async function getPrices() {
        try {
            // 1. جلب سعر الدولار الرسمي
            const curRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const curData = await curRes.json();
            const egpRate = curData.rates.EGP;

            // 2. إعدادات الحساب لدقة الصاغة
            // نستخدم سعر صرف الذهب في مصر (غالباً أعلى من البنك بـ 1.5 إلى 2 جنيه)
            const goldDollarRate = egpRate + 1.8; 
            const goldGlobalOunce = 2170; // سعر تقريبي للأوقية عالمياً

            function createGoldCard(title, factor) {
                const rawPrice = (goldGlobalOunce / 31.1) * goldDollarRate * factor;
                const sellPrice = Math.round(rawPrice); // سعر البيع للمستهلك
                const buyPrice = Math.round(rawPrice - (rawPrice * 0.015)); // سعر الشراء من المستهلك (فرق 1.5%)
                
                return `
                <div class="card">
                    <div class="item-title">${title}</div>
                    <div class="price-row">
                        <div class="price-box">
                            <span class="p-label">بيع</span>
                            <span class="p-value">${sellPrice}</span>
                        </div>
                        <div class="price-box">
                            <span class="p-label">شراء</span>
                            <span class="p-value">${buyPrice}</span>
                        </div>
                    </div>
                </div>`;
            }

            // تحديث محتوى الذهب
            document.getElementById('gold-content').innerHTML = 
                createGoldCard("الذهب عيار 24", 1) +
                createGoldCard("الذهب عيار 21", 0.875) +
                createGoldCard("الذهب عيار 18", 0.75) +
                createGoldCard("الجنيه الذهب (8ج ع21)", 0.875 * 8);

            // تحديث محتوى العملات
            document.getElementById('currency-content').innerHTML = `
                <div class="currency-row">
                    <span class="c-name">الدولار الأمريكي</span>
                    <span class="c-val">${egpRate.toFixed(2)}</span>
                </div>
                <div class="currency-row">
                    <span class="c-name">اليورو</span>
                    <span class="c-val">${(egpRate * 1.08).toFixed(2)}</span>
                </div>
                <div class="currency-row">
                    <span class="c-name">الريال السعودي</span>
                    <span class="c-val">${(egpRate / 3.75).toFixed(2)}</span>
                </div>
                <div class="currency-row">
                    <span class="c-name">الدرهم الإماراتي</span>
                    <span class="c-val">${(egpRate / 3.67).toFixed(2)}</span>
                </div>
            `;

        } catch (e) {
            document.getElementById('gold-content').innerHTML = 
                "<div style='text-align:center; color:#ef4444'>فشل الاتصال بالخادم.. يرجى المحاولة لاحقاً</div>";
        }
    }

    // تشغيل الدالة فور تحميل الصفحة
    getPrices();
    // تحديث البيانات تلقائياً كل 60 ثانية
    setInterval(getPrices, 60000);
</script>

</body>
</html>
